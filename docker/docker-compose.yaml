# =============================================================================
# Docker Compose — AI Dev Workspace Stack (Docker Swarm / Portainer)
# =============================================================================
# Single container with hermes-agent + all UI apps + CLIs:
#   - hermes-agent gateway  (port 8642) — OpenAI-compatible API + Hermes APIs
#   - hermes-agent dashboard (port 9119) — sessions, memory, skills, jobs
#   - OmniRoute             (port 4000) — AI Gateway (proxy/router)
#   - Hermes Workspace      (port 3000) — Full-featured AI agent UI
#   - Aion UI               (port 3005) — Code/AI IDE
#   - Claude Code, Antigravity, OpenCode, CommandCode CLIs
#
# hermes-agent runs INSIDE the container. Hermes Workspace and Aion UI
# connect to it via localhost:8642 and localhost:9119 automatically.
#
# Networks:
#   app_network → Internal overlay for inter-service communication
#   npm_public  → External overlay for Nginx Proxy Manager
# =============================================================================

version: "3.8"

services:
  # -------------------------------------------------------------------------
  # AI Workspace — Single Container (all services inside)
  # -------------------------------------------------------------------------
  ai-workspace:
    image: ${REGISTRY:-local}/ai-workspace:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${OMNIROUTE_PORT:-4000}:4000"
      - "${HERMES_PORT:-3000}:3000"
      - "${AIONUI_PORT:-3005}:3005"
      # Optionally expose hermes-agent gateway for external API access
      # Uncomment if you want direct access to the Hermes API from outside
      # - "${HERMES_GATEWAY_PORT:-8642}:8642"
    networks:
      - app_network
      - npm_public
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - HOST=0.0.0.0
      - AIONUI_HOST=0.0.0.0
      - TAG=${TAG:-latest}
      - REGISTRY=${REGISTRY:-local}
      - OMNIROUTE_PORT=${OMNIROUTE_PORT:-4000}
      - HERMES_PORT=${HERMES_PORT:-3000}
      - AIONUI_PORT=${AIONUI_PORT:-3005}
      # LLM provider keys — used by hermes-agent, OmniRoute, and Aion UI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      # OmniRoute settings
      - OMNIROUTE_DEFAULT_PROVIDER=${OMNIROUTE_DEFAULT_PROVIDER:-openai}
      - OMNIROUTE_LOG_LEVEL=${OMNIROUTE_LOG_LEVEL:-info}
      - OMNIROUTE_RATE_LIMIT=${OMNIROUTE_RATE_LIMIT:-100}
      - OMNIROUTE_ENABLE_CACHE=${OMNIROUTE_ENABLE_CACHE:-true}
      # hermes-agent — gateway API server auth key
      # Generated once: openssl rand -hex 32
      # Used by entrypoint.sh to configure the gateway, and passed to
      # hermes-workspace as HERMES_API_TOKEN automatically via supervisord.
      - API_SERVER_KEY=${API_SERVER_KEY}
      - HERMES_LLM_MODEL=${HERMES_LLM_MODEL}
      # Hermes Workspace settings

      # HERMES_API_URL and HERMES_DASHBOARD_URL are set to localhost inside
      # supervisord.conf — no need to set them here.
      - HERMES_SECRET_KEY=${HERMES_SECRET_KEY}
      - HERMES_SESSION_SECRET=${HERMES_SESSION_SECRET:-change-me-in-production}
      - HERMES_PASSWORD=${HERMES_PASSWORD}
      - HERMES_ALLOW_INSECURE_REMOTE=${HERMES_ALLOW_INSECURE_REMOTE:-0}
      - COOKIE_SECURE=${COOKIE_SECURE:-0}
      # Aion UI
      - AION_API_URL=${AION_API_URL:-http://localhost:4000}
      - AION_HERMES_URL=${AION_HERMES_URL:-http://localhost:3000}
      - AION_SECRET_KEY=${AION_SECRET_KEY}
      # CLI tools
      - CLAUDE_CODE_API_KEY=${CLAUDE_CODE_API_KEY}
      - CLAUDE_CODE_MODEL=${CLAUDE_CODE_MODEL:-claude-sonnet-4-20250514}
      - ANTIGRAVITY_API_KEY=${ANTIGRAVITY_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - OPENCODE_PROVIDER=${OPENCODE_PROVIDER:-anthropic}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - COMMANDCODE_AUTH_TOKEN=${COMMANDCODE_AUTH_TOKEN}
    volumes:
      - omniroute_data:/data/omniroute
      # hermes-agent persistent data: config, sessions, memory, skills, credentials
      - hermes_data:/opt/data
      - aionui_data:/data/aionui
      - workspace:/workspace
      - cli_config:/root/.config


    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
      labels:
        - "com.outsource.service=ai-workspace"
        - "com.outsource.stack=ai-workspace"
        - "com.outsource.ports=4000,3000,3005"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  omniroute_data:
    driver: local
  # hermes_data — persists hermes-agent state across container restarts:
  #   config, sessions, memory, skills, credentials, scheduled jobs
  hermes_data:
    driver: local
  aionui_data:
    driver: local
  workspace:
    driver: local
  cli_config:
    driver: local


# =============================================================================
# Networks
# =============================================================================
networks:
  # Internal overlay for inter-service communication
  app_network:
    driver: overlay
    internal: true
    attachable: true

  # External overlay managed by Nginx Proxy Manager
  npm_public:
    external: true
